<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphite</title>
  <script src="/sail/baremux/index.js"></script>
  <script src="/sail/scram/scramjet.all.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g0: #08080b;
      --g1: #0f0f14;
      --g2: #16161d;
      --g3: #1e1e27;
      --g4: #2a2a36;
      --g5: #363645;
      --text: #e4e4ef;
      --muted: #7878920;
      --muted2: #888898;
      --accent: #9898c8;
      --accent2: #b0b0d8;
      --safe: #70c080;
      --glass: rgba(255,255,255,0.04);
      --glass-b: rgba(255,255,255,0.09);
      --glass-hl: rgba(255,255,255,0.13);
      --blur: blur(20px) saturate(140%);
    }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: var(--g0);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── TAB BAR ── */
    #tab-bar {
      height: 38px;
      min-height: 38px;
      background: rgba(10,10,14,0.95);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      display: flex;
      align-items: flex-end;
      padding: 0 8px 0 8px;
      gap: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 100;
    }

    .tab {
      height: 32px;
      min-width: 160px;
      max-width: 220px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px 10px 0 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px 0 10px;
      cursor: pointer;
      color: var(--muted2);
      user-select: none;
      transition: background 0.15s, color 0.15s;
      font-size: 12.5px;
      font-weight: 400;
      border: 1px solid transparent;
      border-bottom: none;
      position: relative;
      overflow: hidden;
    }

    .tab::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tab:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .tab:hover::before { opacity: 1; }

    .tab.active {
      background: rgba(255,255,255,0.09);
      color: var(--text);
      border-color: rgba(255,255,255,0.08);
    }

    .tab.active::before { opacity: 1; }

    .tab-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.8; }
    .tab-icon svg { width: 100%; height: 100%; fill: var(--accent); }

    .tab-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .tab-close {
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      line-height: 1;
      color: var(--muted2);
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }

    .tab-close:hover {
      background: rgba(255,255,255,0.12);
      color: var(--text);
    }

    .new-tab-btn {
      width: 28px; height: 28px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: var(--muted2);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      align-self: center;
      margin-bottom: 3px;
    }

    .new-tab-btn:hover {
      background: rgba(255,255,255,0.10);
      color: var(--text);
    }

    /* ── NAVBAR ── */
    #navbar {
      height: 50px;
      min-height: 50px;
      background: rgba(12,12,17,0.97);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      position: relative;
      z-index: 100;
    }

    .nav-btn {
      width: 30px; height: 30px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.09); }
    .nav-btn:active { background: rgba(255,255,255,0.05); }

    .nav-btn svg {
      width: 15px; height: 15px;
      fill: var(--muted2);
      transition: fill 0.15s;
    }

    .nav-btn:hover svg { fill: var(--text); }

    .address-bar {
      flex: 1;
      height: 32px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .address-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .address-bar:focus-within {
      background: rgba(255,255,255,0.08);
      border-color: rgba(160,160,210,0.3);
      box-shadow: 0 0 0 3px rgba(120,120,200,0.08);
    }

    .lock-icon { width: 12px; height: 12px; flex-shrink: 0; }
    .lock-icon svg { width: 100%; height: 100%; fill: var(--safe); }

    #bar {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: 'Sora', sans-serif;
      font-weight: 400;
    }

    #bar::placeholder { color: var(--muted2); }

    /* ── BOOKMARKS BAR ── */
    #bookmarks-bar {
      height: 28px;
      min-height: 28px;
      background: rgba(10,10,14,0.9);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 4px;
      position: relative;
      z-index: 100;
    }

    .bookmark {
      color: var(--muted2);
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      padding: 3px 9px;
      border-radius: 6px;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .bookmark:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* ── VIEWPORT ── */
    #viewport-container {
      flex: 1;
      position: relative;
      background: #fff;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      display: none;
      background: white;
    }

    iframe.active { display: block; }

    /* ── SETTINGS PANEL ── */
    #settings-panel {
      position: fixed;
      top: 94px;
      right: 12px;
      width: 300px;
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      background: rgba(20,20,28,0.92);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 20px;
      display: none;
      z-index: 9999;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.10);
      animation: panelIn 0.2s ease;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    #settings-panel.open { display: block; }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .settings-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .settings-close {
      width: 24px; height: 24px;
      border: none;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
      cursor: pointer;
      color: var(--muted2);
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .settings-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    .settings-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .settings-select,
    .settings-input {
      width: 100%;
      height: 38px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      padding: 0 12px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s, background 0.15s;
    }

    .settings-select:focus,
    .settings-input:focus {
      border-color: rgba(140,140,210,0.3);
      background: rgba(255,255,255,0.08);
    }

    .settings-select option { background: #1a1a24; }

    #custom-ws-group { display: none; }

    .settings-save {
      width: 100%;
      height: 38px;
      border: none;
      background: linear-gradient(135deg, rgba(130,130,200,0.8), rgba(100,100,180,0.6));
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 13px;
      border-radius: 9px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.05em;
      border: 1px solid rgba(160,160,220,0.2);
    }

    .settings-save:hover { opacity: 0.9; transform: translateY(-1px); }
    .settings-save:active { transform: translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>

  <div id="tab-bar">
    <button class="new-tab-btn" onclick="addTab()">+</button>
  </div>

  <div id="navbar">
    <button class="nav-btn" onclick="goBack()" title="Back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
        <path d="M73.4 297.4C60.9 309.9 60.9 330.2 73.4 342.7L233.4 502.7C245.9 515.2 266.2 515.2 278.7 502.7C291.2 490.2 291.2 469.9 278.7 457.4L173.3 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L173.3 288L278.7 182.6C291.2 170.1 291.2 149.8 278.7 137.3C266.2 124.8 245.9 124.8 233.4 137.3L73.4 297.3z"/>
      </svg>
    </button>
    <button class="nav-btn" onclick="goForward()" title="Forward" style="transform:rotate(180deg)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
        <path d="M73.4 297.4C60.9 309.9 60.9 330.2 73.4 342.7L233.4 502.7C245.9 515.2 266.2 515.2 278.7 502.7C291.2 490.2 291.2 469.9 278.7 457.4L173.3 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L173.3 288L278.7 182.6C291.2 170.1 291.2 149.8 278.7 137.3C266.2 124.8 245.9 124.8 233.4 137.3L73.4 297.3z"/>
      </svg>
    </button>
    <button class="nav-btn" onclick="refreshTab()" title="Refresh">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">

      </svg>
    </button>

    <div class="address-bar">
      <div class="lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
          <path d="M144 144V112C144 76.7 172.7 48 208 48H240C275.3 48 304 76.7 304 112V144H144zM96 144H80C53.5 144 32 165.5 32 192V432C32 458.5 53.5 480 80 480H368C394.5 480 416 458.5 416 432V192C416 165.5 394.5 144 368 144H352V112C352 50.1 301.9 0 240 0H208C146.1 0 96 50.1 96 112V144z"/>
        </svg>
      </div>
      <input type="text" id="bar" placeholder="Search or enter URL" autocomplete="off" spellcheck="false">
    </div>

    <button class="nav-btn" onclick="toggleSettings()" title="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
        <path d="M259.173.5C262.1 58.7 275.2 48 290.4 48L350.2 48C365.4 48 378.5 58.7 381.5 73.5L396 143.5C410.1 149.5 423.3 157.2 435.3 166.3L503.1 143.8C517.5 139 533.3 145 540.9 158.2L570.8 210C578.4 223.2 575.7 239.8 564.3 249.9L511 297.3C511.9 304.7 512.3 312.3 512.3 320C512.3 327.7 511.8 335.3 511 342.7L564.4 390.2C575.8 400.3 578.4 417 570.9 430.1L541 481.9C533.4 495 517.6 501.1 503.2 496.3L435.4 473.8C423.3 482.9 410.1 490.5 396.1 496.6L381.7 566.5C378.6 581.4 365.5 592 350.4 592L290.6 592C275.4 592 262.3 581.3 259.3 566.5L244.9 496.6C230.8 490.6 217.7 482.9 205.6 473.8L137.5 496.3C123.1 501.1 107.3 495.1 99.7 481.9L69.8 430.1C62.2 416.9 64.9 400.3 76.3 390.2L129.7 342.7C128.8 335.3 128.4 327.7 128.4 320C128.4 312.3 128.9 304.7 129.7 297.3L76.3 249.8C64.9 239.7 62.3 223 69.8 209.9L99.7 158.1C107.3 144.9 123.1 138.9 137.5 143.7L205.3 166.2C217.4 157.1 230.6 149.5 244.6 143.4L259.1 73.5zM320.3 400C364.5 399.8 400.2 363.9 400 319.7C399.8 275.5 363.9 239.8 319.7 240C275.5 240.2 239.8 276.1 240 320.3C240.2 364.5 276.1 400.2 320.3 400z"/>
      </svg>
    </button>
  </div>

  <div id="bookmarks-bar">
    <a class="bookmark" href="javascript:void(0)" onclick="quickNav('https://google.com')">Google</a>
    <a class="bookmark" href="javascript:void(0)" onclick="quickNav('https://youtube.com')">YouTube</a>
    <a class="bookmark" href="javascript:void(0)" onclick="quickNav('https://discord.com/app')">Discord</a>
    <a class="bookmark" href="javascript:void(0)" onclick="quickNav('https://github.com')">GitHub</a>
  </div>

  <div id="viewport-container"></div>

  <div id="settings-panel">
    <div class="settings-header">
      <div class="settings-title">Settings</div>
      <button class="settings-close" onclick="toggleSettings()">✕</button>
    </div>
    <label class="settings-label">Wisp Server</label>
    <select id="ws-select" class="settings-select">
      <option value="default">wss://wisp.classroom.lat/</option>
      <option value="custom">Custom</option>
    </select>
    <div id="custom-ws-group">
      <label class="settings-label">Custom Wisp URL</label>
      <input type="text" id="custom-ws" class="settings-input" placeholder="wss://example.com/wisp/">
    </div>
    <button class="settings-save" onclick="saveSettings()">Save Settings</button>
  </div>

  <script>
    const tabBar = document.getElementById("tab-bar");
    const bar = document.getElementById("bar");
    const viewportContainer = document.getElementById("viewport-container");
    const wsSelect = document.getElementById("ws-select");
    const customWsGroup = document.getElementById("custom-ws-group");
    const customWsInput = document.getElementById("custom-ws");

    let isFocused = false;
    let tabs = [];
    let activeTabId = null;

    bar.addEventListener("focus", () => { isFocused = true; });
    bar.addEventListener("blur", () => { isFocused = false; });

    const defaultWs = "wss://wisp.classroom.lat/";
    let currentWs = localStorage.getItem("proxy-ws") || defaultWs;

    navigator.serviceWorker.register("/sail/sw.js");
    const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js");

    async function applyTransport() {
      await connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: currentWs }]);
    }
    applyTransport();

    const { ScramjetController } = $scramjetLoadController();
    const scramjet = new ScramjetController({
      files: {
        all: "/sail/scram/scramjet.all.js",
        wasm: "/sail/scram/scramjet.wasm.wasm",
        sync: "/sail/scram/scramjet.sync.js"
      },
      prefix: "/sail/go/"
    });
    scramjet.init();

    function decodeProxiedUrl(u) {
      if (!u) return "";
      try {
        if (u.includes("/sail/go/")) {
          let part = u.split("/sail/go/")[1] || "";
          return decodeURIComponent(part);
        }
        return u;
      } catch { return u; }
    }

    function updateCustomWsVisibility() {
      customWsGroup.style.display = wsSelect.value === "custom" ? "block" : "none";
    }

    wsSelect.addEventListener("change", updateCustomWsVisibility);

    function toggleSettings() {
      document.getElementById("settings-panel").classList.toggle("open");
    }

    function saveSettings() {
      if (wsSelect.value === "custom") {
        const custom = customWsInput.value.trim();
        if (!custom) return;
        currentWs = custom;
      } else {
        currentWs = defaultWs;
      }
      localStorage.setItem("proxy-ws", currentWs);
      applyTransport();
      toggleSettings();
    }

    function getNewTabPage() {
      return "/newtab/index.html";
    }

    function addTab(url = "graphite://newtab") {
      const id = "tab-" + crypto.randomUUID();
      const tabObj = { id, title: "New Tab", url };
      tabs.push(tabObj);

      const tabEl = document.createElement("div");
      tabEl.className = "tab";
      tabEl.id = "btn-" + id;
      tabEl.innerHTML = `
        <div class="tab-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polygon points="12,2 22,7 22,17 12,22 2,17 2,7" opacity="0.7"/>
          </svg>
        </div>
        <span class="tab-title">New Tab</span>
        <div class="tab-close">×</div>
      `;
      tabEl.onclick = () => switchTab(id);
      tabEl.querySelector(".tab-close").onclick = (e) => closeTab(e, id);
      tabBar.insertBefore(tabEl, document.querySelector(".new-tab-btn"));

      const iframe = document.createElement("iframe");
      iframe.id = "frame-" + id;
      iframe.src = url === "graphite://newtab" ? getNewTabPage() : scramjet.encodeUrl(formatUrl(url));
      iframe.addEventListener("load", () => updateTabTitle(id));
      viewportContainer.appendChild(iframe);

      switchTab(id);
    }

    function switchTab(id) {
      activeTabId = id;
      tabs.forEach(tab => {
        const btn = document.getElementById("btn-" + tab.id);
        const frame = document.getElementById("frame-" + tab.id);
        const active = tab.id === id;
        btn.classList.toggle("active", active);
        frame.classList.toggle("active", active);
        if (active) {
          const f = document.getElementById("frame-" + tab.id);
          bar.value = decodeProxiedUrl(f?.src || tab.url);
        }
      });
    }

    function closeTab(event, id) {
      event.stopPropagation();
      if (tabs.length === 1) return;
      const index = tabs.findIndex(t => t.id === id);
      document.getElementById("btn-" + id)?.remove();
      document.getElementById("frame-" + id)?.remove();
      tabs.splice(index, 1);
      if (activeTabId === id) {
        const next = tabs[index] || tabs[index - 1];
        if (next) switchTab(next.id);
      }
    }

    function formatUrl(url) {
      if (!url) return "";
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        if (url.includes(".")) return "https://" + url;
        return "https://duckduckgo.com/?q=" + encodeURIComponent(url);
      }
      return url;
    }

    function nav() {
      if (!activeTabId) return;
      const value = bar.value.trim();
      if (!value) return;
      const formatted = value === "graphite://newtab" ? "graphite://newtab" : formatUrl(value);
      const tab = tabs.find(t => t.id === activeTabId);
      tab.url = formatted;
      const frame = document.getElementById("frame-" + activeTabId);
      frame.src = formatted === "graphite://newtab" ? getNewTabPage() : scramjet.encodeUrl(formatted);
      bar.value = decodeProxiedUrl(frame.src);
      updateTabTitle(activeTabId, formatted);
    }

    function updateTabTitle(id, fallback = "Loading...") {
      const tab = tabs.find(t => t.id === id);
      let title = fallback;
      if (tab.url === "graphite://newtab") {
        title = "New Tab";
      } else {
        try { title = new URL(tab.url).hostname; } catch { title = fallback; }
      }
      const el = document.querySelector(`#btn-${id} .tab-title`);
      if (el) el.textContent = title;
    }

    function goBack()    { if (activeTabId) document.getElementById("frame-" + activeTabId)?.contentWindow?.history?.back(); }
    function goForward() { if (activeTabId) document.getElementById("frame-" + activeTabId)?.contentWindow?.history?.forward(); }
    function refreshTab(){ if (activeTabId) document.getElementById("frame-" + activeTabId)?.contentWindow?.location?.reload(); }
    function quickNav(url) { bar.value = url; nav(); }

    bar.addEventListener("keydown", e => { if (e.key === "Enter") nav(); });

    setInterval(() => {
      if (!activeTabId || isFocused) return;
      const frame = document.getElementById("frame-" + activeTabId);
      if (!frame) return;
      const decoded = decodeProxiedUrl(frame.src);
      if (bar.value !== decoded) bar.value = decoded;
    }, 500);

    window.addEventListener("load", () => {
      updateCustomWsVisibility();
      addTab("graphite://newtab");
    });
  </script>
</body>
</html>
