<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bloxcraft - New Tab</title>
  <link rel="icon" href="/bloxcraft_transparent.png" type="image/png">
  <style>
    :root{
      --tile-bg: rgba(255,255,255,0.85);
      --tile-hover: rgba(255,255,255,0.95);
      --shadow: 0 6px 18px rgba(0,0,0,0.12);
      --radius: 12px;
      --muted: rgba(32,33,36,0.6);
    }
    #bgFrame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 0;
      pointer-events: none; 
      filter: brightness(0.8); 
      background: transparent;
    }
    body {
      background-color: black; 
      background: linear-gradient(-45deg, #1e1b4b, #312e81, #3730a3, #1e3a8a);
      margin: 0;
      font-family: "Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      color: #fff; 
      overflow: hidden;
    }
    html, body {
      margin: 0;
      height: 100%;
      display: flex;
      align-items: center; 
      justify-content: center; 
      text-align: center;
    }
    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo-rect {
      width: 250px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo-rect img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    /* Fixed search container and padding values */
    .search-wrapper {
      position: relative;
      width: 480px;
      max-width: 90vw;
      margin-bottom: 36px;
    }
    .search-input {
      width: 100%;
      height: 50px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      padding: 0 24px;
      font-size: 16px;
      color: #222;
      background: white;
      outline: none;
      box-sizing: border-box;
    }
    .shortcuts {
      width: min(760px, 90vw);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 18px;
      justify-items: center;
    }
    .tile {
      position: relative;
      width: 110px;
      height: 110px;
      background: var(--tile-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #222;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      padding: 10px;
      cursor: pointer;
      box-sizing: border-box;
    }
    .tile:hover {
      background: var(--tile-hover);
      transform: translateY(-4px);
    }
    .tile img.fav {
      width: 40px;
      height: 40px;
      margin-bottom: 8px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.6);
      padding: 6px;
    }
    .tile span {
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .add-btn {
      font-size: 44px;
      color: var(--muted);
      user-select: none;
      line-height: 1;
      margin-bottom: 4px;
    }
    .remove-btn {
      position: absolute;
      top: 6px; 
      right: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 12px;
      line-height: 20px;
      text-align: center;
      opacity: 0;
      transition: opacity .2s ease;
      cursor: pointer;
      z-index: 5;
    }
    .tile:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(220, 50, 50, 0.9); }
    
    /* MODAL WINDOWS */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      visibility: hidden;
      opacity: 0;
      transition: opacity .2s ease, visibility .2s ease;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: #222;
      text-align: left;
    }
    .modal-content h2 { margin: 0; font-size: 18px; }
    .modal-content input {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #ccc; font-size: 14px; box-sizing: border-box;
    }
    .modal-content button {
      padding: 8px 14px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
    .btn-cancel { background: #eee; color: #555; }
    .btn-add { background: #1a73e8; color: white; }
  </style>
</head>
<body>

  <iframe id="bgFrame" srcdoc='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>:root { --fade-dur:500ms; --logo-size:100px; }* { box-sizing:border-box; margin:0; padding:0; }body { height:100vh; width:100vw; display:flex; justify-content:center; align-items:center; background:transparent; overflow:hidden; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica Neue,Arial; color:white; position:relative; }.dot { position:absolute; background:white; border-radius:50%; opacity:0.3; top:-10px; animation:fall linear infinite; }@keyframes fall { 0%{transform:translateY(0) scale(1);opacity:0.6} 100%{transform:translateY(110vh) scale(1.2);opacity:0.0} }.container { display:flex; align-items:center; gap:40px; z-index:10; text-align:center; }.text-section { display:flex; flex-direction:column; align-items:center; }.text-container { position:relative; display:inline-block; padding-bottom:8px; }.underline { position:absolute; bottom:0; left:0; height:3px; width:100%; background:linear-gradient(90deg,#818cf8,#a78bfa); border-radius:10px; box-shadow:0 0 10px #a78bfa; }h1:first-child{color:#E1D9D1} h2{font-size:32px;margin-top:10px;color:white;font-weight:500}#Changing-Text{display:inline-block; opacity:1; transition:opacity var(--fade-dur) ease;}.fade-out{opacity:0}.fade-in{opacity:1}.logo{width:var(--logo-size);height:var(--logo-size);user-select:none;opacity:0.85;}</style></head><body><script>const numDots=80;for(let i=0;i<numDots;i++){ const d=document.createElement("div"); d.className="dot"; const s=Math.random()*3+1; d.style.width=s+"px"; d.style.height=s+"px"; d.style.left=Math.random()*100+"%"; d.style.animationDuration=(4+Math.random()*8)+"s"; d.style.animationDelay=Math.random()*5+"s"; document.body.appendChild(d); }</script><div class="container"><div class="text-section"><div class="text-container"><h1>Bloxcraft <span style="color:white;">New Tab</span></h1><h2><span id="Changing-Text">Searching</span></h2><div class="underline"></div></div></div></div><script>const words=["Searching","Finding","Adventures"];const el=document.getElementById("Changing-Text");let idx=0;function changeWord(){ el.classList.add("fade-out"); setTimeout(()=>{ idx=(idx+1)%words.length; el.textContent=words[idx]; el.classList.remove("fade-out"); el.classList.add("fade-in"); setTimeout(()=>el.classList.remove("fade-in"),500); },500); }setInterval(changeWord,2500);</script></body></html>'></iframe>

  <div class="wrap">
    <div class="logo-rect">
      <a href="https://bloxcraft-ubg.pages.dev">
        <img src="https://cdn.jsdelivr.net/gh/tharun9772/tharun9772.github.io@main/bloxcraft_transparent.png" alt="logo">
      </a>
    </div>                  
    
    <div class="search-wrapper">
      <input class="search-input" placeholder="Type something to search..." autocomplete="off">
    </div>

    <div class="shortcuts" id="shortcuts"></div>
  </div>

  <div class="modal" id="addModal">
    <div class="modal-content">
      <h2>Add Shortcut</h2>
      <input type="text" id="nameInput" placeholder="Name" required>
      <input type="url" id="urlInput" placeholder="URL (https://...)" required>
      <input type="url" id="iconInput" placeholder="Icon URL (optional)">
      <div class="btn-row">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-add" id="addBtn">Add</button>
      </div>
    </div>
  </div>

  <script>
    const shortcutsEl = document.getElementById('shortcuts');
    const modal = document.getElementById('addModal');
    const nameInput = document.getElementById('nameInput');
    const urlInput = document.getElementById('urlInput');
    const iconInput = document.getElementById('iconInput');
    const addBtn = document.getElementById('addBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    const defaultShortcuts = [
      {name:"Bloxcraft UBG", url:"https://bloxcraft-ubg.pages.dev", icon:"https://bloxcraft-ubg.pages.dev/bloxcraft_transparent.png"},
      {name:"YouTube", url:"https://www.youtube.com", icon:"https://www.youtube.com/favicon.ico"},
      {name:"DuckDuckGo", url:"https://duckduckgo.com", icon:"https://duckduckgo.com/static-assets/favicons/DDG-iOS-icon_60x60.png"}
    ];

    /* ── DIRECT UNCOMPLICATED PROXY ROUTING ── */
    function goProxy(targetUrl) {
      let query = targetUrl.trim();
      if (!query) return;

      // Determine if text string is a raw web address or a standard text search string
      const isUrl = query.startsWith('http://') || query.startsWith('https://') || (query.includes('.') && !query.includes(' '));
      if (!isUrl) {
        query = 'https://duckduckgo.com/?q=' + encodeURIComponent(query);
      } else if (!query.startsWith('http')) {
        query = 'https://' + query;
      }

      // Check if your primary browser container has custom proxy translation loaded locally
      const customEncoder = window.__uv$encodeUrl || (window.top && window.top.__uv$encodeUrl);
      if (customEncoder) {
        window.top.location.href = window.top.location.origin + "/uv/service/" + customEncoder(query);
      } else {
        // Simple direct browser query navigation fallback
        window.top.location.href = query;
      }
    }

    function loadShortcuts(){
      const data = localStorage.getItem('shortcuts');
      return data ? JSON.parse(data) : defaultShortcuts;
    }
    
    function saveShortcuts(list){
      localStorage.setItem('shortcuts', JSON.stringify(list));
    }

    function renderShortcuts(){
      const list = loadShortcuts();
      shortcutsEl.innerHTML = '';
      
      list.forEach((s, i)=>{
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = '#';
        a.innerHTML = `
          <div class="remove-btn" title="Remove">×</div>
          <img class="fav" src="${s.icon || 'https://cdn-icons-png.flaticon.com/512/545/545682.png'}" alt="">
          <span>${s.name}</span>
        `;
        
        // Link clicking goes to our centralized router instead of basic href bindings
        a.addEventListener('click', (e)=>{
          if (!e.target.classList.contains('remove-btn')) {
            e.preventDefault();
            goProxy(s.url);
          }
        });

        a.querySelector('.remove-btn').addEventListener('click',(e)=>{
          e.preventDefault();
          e.stopPropagation();
          const list = loadShortcuts();
          list.splice(i,1);
          saveShortcuts(list);
          renderShortcuts();
        });
        shortcutsEl.appendChild(a);
      });

      const add = document.createElement('div');
      add.className = 'tile';
      add.innerHTML = `<div class="add-btn">+</div><span>Add Shortcut</span>`;
      add.addEventListener('click', ()=>modal.classList.add('active'));
      shortcutsEl.appendChild(add);
    }

    renderShortcuts();

    cancelBtn.onclick = () => modal.classList.remove('active');
    addBtn.onclick = () => {
      const name = nameInput.value.trim();
      let url = urlInput.value.trim();
      const icon = iconInput.value.trim();
      if(!name || !url) return;
      
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      
      const list = loadShortcuts();
      list.push({name, url, icon: icon || `https://www.google.com/s2/favicons?domain=${url}&sz=64`});
      saveShortcuts(list);
      modal.classList.remove('active');
      nameInput.value = urlInput.value = iconInput.value = '';
      renderShortcuts();
    };

    modal.addEventListener('click', e => {
      if(e.target === modal) modal.classList.remove('active');
    });

    /* ── SEARCH INPUT ENTER CAPTURE ── */
    const searchInput = document.querySelector('.search-input');
    if (searchInput) {
      searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          goProxy(searchInput.value);
        }
      });
    }
  </script>
</body>
</html>
