<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Graphite — New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght=200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g0: #07070a;
      --g1: #0e0e13;
      --g2: #15151c;
      --g3: #1d1d26;
      --g4: #272733;
      --g5: #333342;
      --text: #e6e6f0;
      --muted: #80809a;
      --accent: #9898c8;
      --accent2: #b4b4d8;
      --glass: rgba(255,255,255,0.04);
      --glass-b: rgba(255,255,255,0.08);
      --glass-hl: rgba(255,255,255,0.12);
      --blur: blur(24px) saturate(160%);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--g0);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }

    /* drifting graphite orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbDrift linear infinite;
    }

    .bg-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #6060a0, transparent 70%);
      top: -200px; left: -100px;
      animation-duration: 22s;
      animation-delay: 0s;
    }
    .bg-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #404080, transparent 70%);
      bottom: -150px; right: -100px;
      animation-duration: 28s;
      animation-delay: -8s;
    }
    .bg-orb:nth-child(3) {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #8080c0, transparent 70%);
      top: 40%; left: 50%;
      animation-duration: 18s;
      animation-delay: -4s;
    }

    @keyframes orbDrift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.05); }
      66%  { transform: translate(-20px, 40px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* falling particle dots */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 180, 220, 0.6);
      animation: particleFall linear infinite;
      pointer-events: none;
    }

    @keyframes particleFall {
      0%   { transform: translateY(-10px); opacity: 0.7; }
      100% { transform: translateY(101vh);  opacity: 0.1; }
    }

    /* ── MAIN LAYOUT ── */
    .wrap {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 20px;
    }

    /* ── HERO TEXT ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .gem-icon {
      width: 48px; height: 48px;
      filter: drop-shadow(0 0 14px rgba(160,160,220,0.5));
    }

    .gem-icon svg { width: 100%; height: 100%; }

    .hero-title {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e8e8fc 0%, #a8a8d8 45%, #6868b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .hero-sub {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-changing {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--accent2);
      opacity: 0.85;
      height: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hero-changing::before {
      content: '';
      display: block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    #changingWord {
      transition: opacity 0.4s ease;
    }

    #changingWord.fade { opacity: 0; }

    /* ── SEARCH BAR ── */
    .search-wrap {
      position: relative;
      width: min(560px, 90vw);
      margin-bottom: 36px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .search-bar {
      width: 100%;
      height: 48px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.10);
      position: relative;
      overflow: hidden;
    }

    .search-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    }

    .search-bar:focus-within {
      background: rgba(255,255,255,0.09);
      border-color: rgba(140,140,210,0.35);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        0 0 0 3px rgba(100,100,180,0.10),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .search-icon {
      width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5;
    }

    .search-icon svg { width: 100%; height: 100%; fill: var(--text); }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 400;
    }

    #searchInput::placeholder { color: var(--muted); }

    .search-hint {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
      flex-shrink: 0;
      padding: 3px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 5px;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* ── SHORTCUTS GRID ── */
    .shortcuts {
      width: min(680px, 92vw);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
      gap: 14px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .tile {
      position: relative;
      height: 100px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      overflow: hidden;
      box-shadow:
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.07);
      padding: 10px 8px;
    }

    .tile::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      transition: opacity 0.18s;
    }

    .tile:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-3px);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .tile:active { transform: translateY(-1px); }

    .tile img.fav {
      width: 36px; height: 36px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      padding: 6px;
    }

    .tile span {
      font-size: 11.5px;
      font-weight: 400;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90%;
      color: var(--muted);
      transition: color 0.18s;
    }

    .tile:hover span { color: var(--text); }

    .add-tile {
      background: rgba(255,255,255,0.025);
      border-style: dashed;
      border-color: rgba(255,255,255,0.10);
    }

    .add-tile:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(140,140,210,0.25);
      border-style: dashed;
    }

    .add-icon {
      font-size: 28px;
      font-weight: 200;
      color: var(--muted);
      line-height: 1;
      transition: color 0.18s;
    }

    .add-tile:hover .add-icon { color: var(--accent2); }

    /* remove btn */
    .remove-btn {
      position: absolute;
      top: 7px; right: 7px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      font-size: 11px;
      line-height: 17px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .tile:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(220,80,80,0.4); }

    /* ── CLOCK ── */
    .clock {
      position: fixed;
      top: 28px; right: 32px;
      text-align: right;
      z-index: 2;
      animation: fadeIn 1s ease both;
    }

    .clock-time {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.06em;
      opacity: 0.85;
    }

    .clock-date {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── MODAL ── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal.active { visibility: visible; opacity: 1; }

    .modal-box {
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      background: rgba(18,18,26,0.94);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 28px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.10);
      animation: panelIn 0.22s ease both;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: scale(0.96) translateY(-8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .modal-box input {
      width: 100%;
      height: 38px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .modal-box input:focus {
      border-color: rgba(140,140,210,0.35);
      background: rgba(255,255,255,0.08);
    }

    .modal-box input::placeholder { color: var(--muted); }

    .btn-row { display: flex; justify-content: flex-end; gap: 8px; }

    .btn-cancel {
      height: 36px;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.05);
      border-radius: 9px;
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-cancel:hover { background: rgba(255,255,255,0.09); color: var(--text); }

    .btn-add {
      height: 36px;
      padding: 0 18px;
      border: 1px solid rgba(140,140,210,0.25);
      background: linear-gradient(135deg, rgba(110,110,190,0.7), rgba(80,80,160,0.5));
      border-radius: 9px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div class="bg" id="bg">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <div class="clock">
    <div class="clock-time" id="clockTime">—</div>
    <div class="clock-date" id="clockDate">—</div>
  </div>

  <div class="wrap">

    <div class="hero">
      <div class="hero-logo">
        <div class="gem-icon">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#d0d0f0"/>
                <stop offset="50%" style="stop-color:#8080c0"/>
                <stop offset="100%" style="stop-color:#3a3a70"/>
              </linearGradient>
              <linearGradient id="g2" x1="0%" y1="0%" x2="60%" y2="60%">
                <stop offset="0%" style="stop-color:rgba(255,255,255,0.55)"/>
                <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
              </linearGradient>
            </defs>
            <polygon points="32,3 60,19 60,45 32,61 4,45 4,19" fill="url(#g1)" opacity="0.92"/>
            <polygon points="32,3 60,19 32,32" fill="url(#g2)" opacity="0.5"/>
            <polygon points="32,3 4,19 32,32" fill="rgba(255,255,255,0.06)"/>
            <polygon points="32,32 60,19 60,45 32,61" fill="rgba(0,0,0,0.22)"/>
            <polygon points="32,32 4,19 4,45 32,61" fill="rgba(0,0,0,0.12)"/>
          </svg>
        </div>
        <div class="hero-title">Graphite</div>
      </div>
      <div class="hero-sub">New Tab</div>
      <div class="hero-changing">
        <span id="changingWord">Searching</span>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-bar">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <input id="searchInput" type="text" placeholder="Search DuckDuckGo or enter a URL..." autocomplete="off" spellcheck="false">
        <span class="search-hint">↵ Enter</span>
      </div>
    </div>

    <div class="shortcuts" id="shortcuts"></div>

  </div>

  <div class="modal" id="addModal">
    <div class="modal-box">
      <div class="modal-title">Add Shortcut</div>
      <input type="text"  id="nameInput" placeholder="Name">
      <input type="url"   id="urlInput"  placeholder="URL (https://...)">
      <input type="url"   id="iconInput" placeholder="Icon URL (optional)">
      <div class="btn-row">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-add"    id="confirmBtn">Add</button>
      </div>
    </div>
  </div>

  <script>
    /* ── PROXY REDIRECT HANDLER ── */
    function goProxy(targetUrl) {
      let url = targetUrl.trim();
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }

      // 1. Pull current environment encoding objects up the live iframe hierarchy
      const uvConfig = window.__uv$config || (window.parent && window.parent.__uv$config) || (window.top && window.top.__uv$config);
      const uvEncode = window.__uv$encodeUrl || (window.parent && window.parent.__uv$encodeUrl) || (window.top && window.top.__uv$encodeUrl);

      if (uvConfig && uvEncode) {
        window.top.location.href = window.top.location.origin + uvConfig.prefix + uvEncode(url);
        return;
      }

      // 2. Custom Script Fallback via search index redirection (Standard logic used on static Cloudflare architectures)
      // This routes back through the primary processing engine index file to execute configuration workers properly
      window.top.location.href = window.top.location.origin + "/index.html?url=" + encodeURIComponent(url);
    }

    /* ── PARTICLES ── */
    const bg = document.getElementById('bg');
    for (let i = 0; i < 120; i++) {
      const d = document.createElement('div');
      d.className = 'particle';
      const s = Math.random() * 2.5 + 1;
      d.style.cssText = `
        width:${s}px; height:${s}px;
        left:${Math.random()*100}%;
        animation-duration:${5 + Math.random()*14}s;
        animation-delay:${Math.random()*10}s;
        opacity:${0.2 + Math.random()*0.5};
      `;
      bg.appendChild(d);
      d.addEventListener('animationiteration', () => {
        d.style.left = Math.random()*100 + '%';
        d.style.animationDuration = (5 + Math.random()*14) + 's';
      });
    }

    /* ── CLOCK ── */
    function updateClock() {
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      const hh = h % 12 || 12, mm = m < 10 ? '0'+m : m;
      const ampm = h < 12 ? 'AM' : 'PM';
      document.getElementById('clockTime').textContent = `${hh}:${mm} ${ampm}`;
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      document.getElementById('clockDate').textContent =
        `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ── CHANGING WORD ── */
    const words = ['Searching', 'Browsing', 'Discovering', 'Exploring', 'Loading'];
    const wordEl = document.getElementById('changingWord');
    let wi = 0;
    setInterval(() => {
      wordEl.classList.add('fade');
      setTimeout(() => {
        wi = (wi + 1) % words.length;
        wordEl.textContent = words[wi];
        wordEl.classList.remove('fade');
      }, 400);
    }, 2400);

    /* ── SHORTCUTS ── */
    const defaultShortcuts = [
      { name: 'YouTube',    url: 'https://youtube.com',    icon: 'https://www.youtube.com/favicon.ico' },
      { name: 'DuckDuckGo', url: 'https://duckduckgo.com', icon: 'https://duckduckgo.com/static-assets/favicons/DDG-iOS-icon_60x60.png' },
      { name: 'GitHub',     url: 'https://github.com',     icon: 'https://github.com/favicon.ico' },
      { name: 'Discord',    url: 'https://discord.com/app',icon: 'https://discord.com/assets/favicon.ico' },
    ];

    function loadShortcuts() {
      try {
        const d = localStorage.getItem('graphite-shortcuts');
        return d ? JSON.parse(d) : defaultShortcuts;
      } catch { return defaultShortcuts; }
    }

    function saveShortcuts(list) {
      localStorage.setItem('graphite-shortcuts', JSON.stringify(list));
    }

    function renderShortcuts() {
      const list = loadShortcuts();
      const el = document.getElementById('shortcuts');
      el.innerHTML = '';

      list.forEach((s, i) => {
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = '#';
        a.innerHTML = `
          <div class="remove-btn" title="Remove">✕</div>
          <img class="fav" src="${s.icon || 'https://cdn-icons-png.flaticon.com/512/545/545682.png'}" alt="" onerror="this.style.display='none'">
          <span>${s.name}</span>
        `;
        
        a.addEventListener('click', e => {
          e.preventDefault();
          goProxy(s.url);
        });

        a.querySelector('.remove-btn').addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          const l = loadShortcuts();
          l.splice(i, 1);
          saveShortcuts(l);
          renderShortcuts();
        });
        el.appendChild(a);
      });

      // Add shortcut tile
      const add = document.createElement('div');
      add.className = 'tile add-tile';
      add.innerHTML = `<div class="add-icon">+</div><span>Add</span>`;
      add.addEventListener('click', () => document.getElementById('addModal').classList.add('active'));
      el.appendChild(add);
    }

    renderShortcuts();

    /* ── SEARCH ── */
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const val = e.target.value.trim();
      if (!val) return;
      const isUrl = val.startsWith('http://') || val.startsWith('https://') || (val.includes('.') && !val.includes(' '));
      
      const finalUrl = isUrl
        ? (val.startsWith('http') ? val : 'https://' + val)
        : 'https://duckduckgo.com/?q=' + encodeURIComponent(val);
        
      goProxy(finalUrl);
    });

    /* ── MODAL ── */
    const modal   = document.getElementById('addModal');
    const nameIn  = document.getElementById('nameInput');
    const urlIn   = document.getElementById('urlInput');
    const iconIn  = document.getElementById('iconInput');

    document.getElementById('cancelBtn').onclick  = () => modal.classList.remove('active');
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

    document.getElementById('confirmBtn').onclick = () => {
      const name = nameIn.value.trim();
      const url  = urlIn.value.trim();
      const icon = iconIn.value.trim();
      if (!name || !url) return;
      const list = loadShortcuts();
      list.push({ name, url, icon: icon || `https://www.google.com/s2/favicons?domain=${url}&sz=64` });
      saveShortcuts(list);
      modal.classList.remove('active');
      nameIn.value = urlIn.value = iconIn.value = '';
      renderShortcuts();
    };
  </script>
</body>
</html>
