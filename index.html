<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphite</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g0: #0a0a0c;
      --g1: #111115;
      --g2: #18181f;
      --g3: #222229;
      --g4: #2e2e38;
      --g5: #3a3a48;
      --text: #e8e8f0;
      --muted: #8888a0;
      --accent: #9090c0;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.10);
      --glass-highlight: rgba(255,255,255,0.14);
      --blur: blur(24px) saturate(160%);
    }

    html, body {
      height: 100%;
      background: var(--g0);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      overflow: hidden;
    }

    /* animated graphite mesh background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(100,100,160,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(80,80,130,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 100% 100% at 50% 50%, rgba(30,30,50,0.8) 0%, transparent 100%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.8; }
      100% { opacity: 1; }
    }

    .container {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 48px;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.7s ease both;
    }

    .logo-gem {
      width: 64px; height: 64px;
      position: relative;
    }

    .logo-gem svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 18px rgba(160,160,220,0.5));
    }

    .logo-title {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e0e0f8 0%, #a0a0d0 50%, #7070b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 16px rgba(120,120,200,0.3));
    }

    .logo-sub {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card {
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 380px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.7s 0.15s ease both;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.3);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    }

    .card-label {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .btn-row {
      display: flex;
      gap: 14px;
      width: 100%;
    }

    .proxy-btn {
      flex: 1;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .proxy-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .proxy-btn:hover::before { opacity: 1; }
    .proxy-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    }

    .proxy-btn:active { transform: translateY(0); }

    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
    }

    .btn-icon svg { width: 18px; height: 18px; fill: var(--accent); }

    .btn-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-tag {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .recommended {
      background: rgba(120,120,200,0.10);
      border-color: rgba(140,140,210,0.25);
    }

    .recommended .btn-icon { background: rgba(120,120,200,0.18); }
    .recommended .btn-icon svg { fill: #b0b0e0; }

    .rec-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 600;
      color: #a0a0d0;
      background: rgba(120,120,200,0.18);
      border: 1px solid rgba(140,140,220,0.2);
      border-radius: 20px;
      padding: 2px 7px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <div class="logo-gem">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#d0d0f0"/>
              <stop offset="50%" style="stop-color:#8080c0"/>
              <stop offset="100%" style="stop-color:#404070"/>
            </linearGradient>
            <linearGradient id="gemHighlight" x1="0%" y1="0%" x2="60%" y2="60%">
              <stop offset="0%" style="stop-color:rgba(255,255,255,0.6)"/>
              <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
            </linearGradient>
          </defs>
          <polygon points="32,4 58,20 58,44 32,60 6,44 6,20" fill="url(#gemGrad)" opacity="0.9"/>
          <polygon points="32,4 58,20 32,32" fill="url(#gemHighlight)" opacity="0.5"/>
          <polygon points="32,4 6,20 32,32" fill="rgba(255,255,255,0.08)"/>
          <polygon points="32,32 58,20 58,44 32,60" fill="rgba(0,0,0,0.25)"/>
          <polygon points="32,32 6,20 6,44 32,60" fill="rgba(0,0,0,0.15)"/>
        </svg>
      </div>
      <div class="logo-title">Graphite</div>
      <div class="logo-sub">Browser Proxy</div>
    </div>

    <div class="card">
      <div class="card-label">Select Engine</div>
      <div class="btn-row">
        <a href="/active/" class="proxy-btn">
          <div class="btn-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
            </svg>
          </div>
          <div class="btn-name">UV Static</div>
          <div class="btn-tag">May be blocked</div>
        </a>
        <a href="/sail/" class="proxy-btn recommended">
          <div class="rec-badge">Recommended</div>
          <div class="btn-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <div class="btn-name">Scramjet</div>
          <div class="btn-tag">Likely unblocked</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
